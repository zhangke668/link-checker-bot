name: Monitored Links Check

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - name: Run monitored links check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_QQ2_PASSWORD: ${{ secrets.SMTP_QQ2_PASSWORD }}
          SMTP_163_USER: ${{ secrets.SMTP_163_USER }}
          SMTP_163_PASSWORD: ${{ secrets.SMTP_163_PASSWORD }}
        run: npm run check-monitored
